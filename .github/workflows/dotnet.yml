name: ShopRestApi CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

jobs:

  build-and-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore Packages
        run: dotnet restore ShopRestApi.sln

      - name: Build Solution
        run: dotnet build ShopRestApi.sln --no-restore --configuration Release

      - name: Run Tests
        run: dotnet test ShopRestApi.Tests/ShopRestApi.Tests.csproj --no-build --configuration Release